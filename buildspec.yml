version: 0.2

env:
  variables:
    REGION: ap-south-1
    PORT: 8080
    ECR_REPO: shop-webapp-ecr
    AWS_ACCOUNT_ID: 720546261973
    IMAGE_TAG: latest
    CLUSTER_NAME: shop-webapp-cluster
  exported-variables:
    - IMAGE_TAG


phases:
  install:
    runtime-versions:
      java: corretto21 
    commands:
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/ 
  
  pre_build:
    commands:
      - export IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - echo "Running Test for Builds"
      - mvn test
      - echo "Logging into Docker Hub"
      - DOCKERHUB_USERNAME=$(aws secretsmanager get-secret-value --secret-id dockerhub-credentials --query SecretString --output text | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
      - DOCKERHUB_PASSWORD=$(aws secretsmanager get-secret-value --secret-id dockerhub-credentials --query SecretString --output text | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
      - echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
      - echo "Logging into ECR"
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
      
  build:
    commands:
       - echo "Build starting"
       - mvn clean package -DskipTests
       - echo "Listing target folder"
       - ls target/
       - echo "Building docker image"
       - docker build -t $ECR_REPO:$IMAGE_TAG .
       - docker tag $ECR_REPO:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing image"
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - echo "Succesfully pushed $ECR_REPO:$IMAGE_TAG to ECR"
      - echo "Updating kubeconfig"
      - aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME
      - echo "Deploying to EKS"
      - kubectl apply -f k8s/deployment.yml
      - kubectl apply -f k8s/service.yml
      - kubectl set image deployment/$ECR_REPO $ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - kubectl rollout status deployment/$ECR_REPO

cache:
  paths:
    - /root/.m2/**/*
