apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shop-webapp
  template:
    metadata:
      labels:
        app: shop-webapp
    spec:
      containers:
        - name: shop-webapp
          image: 720546261973.dkr.ecr.ap-south-1.amazonaws.com/shop-webapp:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: shop-webapp-db-secret
                  key: DB_HOST
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: shop-webapp-db-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shop-webapp-db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shop-webapp-db-secret
                  key: DB_PASSWORD
